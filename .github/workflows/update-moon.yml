name: Update NASA Moon

on:
  schedule:
    # Daily at 07:37 UTC. Avoiding minute 0 reduces GitHub schedule congestion.
    - cron: "37 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-moon:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Embed current NASA Moon
        run: python3 scripts/update_moon.py

      - name: Commit updated banner
        shell: bash
        run: |
          if git diff --quiet -- assets/lunalfresh-space-banner.svg; then
            echo "The Moon frame is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/lunalfresh-space-banner.svg
          git commit -m "Update NASA Moon phase"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
